const API = '/api';

const MOCK_ARTICLE = {
  title: "Building a production-grade CI/CD pipeline with GitHub Actions, Docker, and self-hosted runners",
  slug: "production-cicd-github-actions",
  excerpt: "A complete walkthrough of setting up parallel security scanning, staged deployments with manual approval gates, and automated rollback strategies.",
  level: "Intermediate",
  read_time: 12,
  category: "CI/CD",
  category_slug: "cicd",
  content: "Imagine you own a restaurant. Every time you create a new dish, you have three jobs: cook it (**development**), make sure it's safe to eat (**security**), and actually serve it to customers (**operations**). \n\nMost restaurants do this badly \u2014 the chef cooks, then *much later* someone checks if it's safe, then *even later* a waiter serves it. If something's wrong, customers have already been served before anyone notices.\n\nDevSecOps is what happens when you redesign the kitchen so that **safety checks happen while the food is being cooked**, not after. And when it's ready, it's served automatically \u2014 no one has to remember to do it manually.\n\nThat's the whole idea. Now let's build the kitchen.\n\n## The old way vs the new way\n\n| The Old Way | DevSecOps Way |\n|---|---|\n| One person codes, hands it off, another person deploys it manually \u2014 could take days | You push code, and within minutes it's tested and live |\n| Security is checked at the very end, like a final inspection | Security is checked on *every single change*, immediately |\n| If something breaks in production, you find out from angry users | You're monitoring constantly, so you often catch it first |\n| Undoing a bad deploy means scrambling and guessing | Every version is saved \u2014 you can instantly go back to any previous one |\n\nNetflix, Amazon, and Google all run their systems this way. Thousands of changes go live every single day, and a human almost never has to manually do any of it.\n\n## The big picture \u2014 what we're actually building\n\nBefore touching any code, let's understand the *shape* of the whole system. Think of it like a delivery route a package takes \u2014 from \"you wrote some code\" to \"it's live on the internet.\"\n\n[[DIAGRAM:big_picture]]\n\nNobody manually does steps 1 through 6. You just type `git push`, and a robot does the rest. **That robot is GitHub Actions**, and teaching it what to do is what most of this guide is about.\n\n### Meet the cast of characters\n\nBefore the steps, here's everyone involved, in plain terms:\n\n[[DIAGRAM:cast]]\n\n| Name | What it actually is | Think of it as... |\n|---|---|---|\n| **EC2** | A computer in Amazon's data center that's always on | Renting a desk in someone else's office, except it's a whole computer |\n| **Docker** | A way to package your app + everything it needs into one sealed box | A shipping container \u2014 same box works on any ship, any truck |\n| **Docker Hub** | A storage warehouse for those sealed boxes | Like a locker room where you store boxes until needed |\n| **GitHub Actions** | A robot that watches your code and runs tasks automatically | An assembly line worker who never sleeps |\n| **A \"runner\"** | The actual computer where GitHub Actions' robot does its work | The workbench the robot worker stands at |\n| **nginx** | Software that receives visitors and shows them your website | The receptionist at the front desk, directing people |\n| **SSL / HTTPS** | Encryption so nobody can spy on traffic to your site | A locked, sealed envelope instead of a postcard anyone can read |\n| **DNS** | Translates a domain name (like google.com) into a server's actual address | A phonebook \u2014 name in, number out |\n\nKeep this table nearby. Every section below is really just teaching one of these characters to do its job properly.\n\n## Step 1: Get yourself a computer that's always on (EC2)\n\nYou can't deploy a website without somewhere for it to live. EC2 is Amazon's \"rent a computer\" service. You don't touch any physical hardware \u2014 you just click a few buttons and a virtual computer appears, reachable from anywhere on the internet.\n\n**You'll actually want two of these** \u2014 one as a \"practice\" server (staging) where you test changes safely, and one as the \"real\" server (production) that actual visitors see. Same setup, just two copies.\n\n**How to launch one:**\n- AWS Console \u2192 EC2 \u2192 Launch Instance\n- Pick Ubuntu as the operating system (a free, popular choice)\n- Pick `t2.micro` as the size \u2014 it's free for the first year and plenty for learning\n- Allow these three doors to be open: SSH (so *you* can log in), HTTP, and HTTPS (so *visitors* can reach it)\n- Click launch, and note down the IP address it gives you \u2014 that's its address on the internet\n\n**Logging in for the first time:**\n\nThink of the `.pem` file AWS gives you as a physical key. You need to tell your computer \"only I should be allowed to use this key\":\n\n```bash\nchmod 400 your-key.pem\nssh -i \"your-key.pem\" ubuntu@<the IP address>\n```\n\nIf that works, you're now sitting at a command line \u2014 except it's not your laptop, it's the EC2 computer, even though it might be on the other side of the world.\n\n**A couple of one-time settings**, so things go smoothly later:\n\n```bash\n# Stops git from complaining later about how to merge changes\ngit config --global pull.rebase false\n\n# Lets our automated robot run admin commands without asking for a password each time\necho \"ubuntu ALL=(ALL) NOPASSWD: ALL\" | sudo tee /etc/sudoers.d/ubuntu\n```\n\n**If something goes wrong:**\n\n| What you see | What it means | What to do |\n|---|---|---|\n| \"Permission denied (publickey)\" | Your key file has the wrong permissions | Run the `chmod 400` command again |\n| \"Connection timed out\" | The door (port 22) isn't open | Go back to AWS, open port 22 in the security settings |\n| \"Host key verification failed\" | You connected to this IP before, but it's a different machine now | Run `ssh-keygen -R <the IP>` to forget the old one |\n\n## Step 2: Teach the computer to run sealed boxes (Docker)\n\nHere's the classic problem Docker solves: \"it works on my computer, but not on the server.\" That happens because your computer has different software versions, settings, files lying around \u2014 a million tiny differences.\n\nDocker's answer: don't just send your *code*, send a **sealed box** containing your code *and* everything it needs to run, exactly as is. That box runs identically anywhere \u2014 your laptop, the staging server, the production server, doesn't matter.\n\n**Installing it properly** (skip the shortcut `apt install docker.io` \u2014 it gives you an outdated version):\n\n```bash\nsudo apt-get update\nsudo apt-get install -y ca-certificates curl gnupg\n\nsudo install -m 0755 -d /etc/apt/keyrings\ncurl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg\nsudo chmod a+r /etc/apt/keyrings/docker.gpg\n\necho \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null\n\nsudo apt-get update\nsudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin\n\n# So you don't have to type \"sudo\" before every docker command\nsudo usermod -aG docker ubuntu\nnewgrp docker\n```\n\n**Check it worked:**\n\n```bash\ndocker run hello-world\n```\n\nIf you see a friendly \"Hello from Docker!\" message, the sealed-box machine is ready.\n\n## Step 3: Give GitHub a worker on your own computer (the \"runner\")\n\nNormally, when GitHub Actions wants to run a task, it spins up a *temporary* computer somewhere in the cloud, does the work, then throws that computer away. That's fine for testing code \u2014 but for *deploying* to your specific EC2 server, you need the work to actually happen *on* that server.\n\nThe solution: install a small program on your EC2 called a **runner**. It's like giving GitHub Actions its own employee badge to your office \u2014 now it can ask \"hey, can someone at this specific desk do this task?\" and your EC2 says \"yes, that's me.\"\n\n```bash\nmkdir -p ~/actions-runner && cd ~/actions-runner\n\n# Get this exact command from: GitHub repo \u2192 Settings \u2192 Actions \u2192 Runners \u2192 New self-hosted runner\ncurl -o actions-runner-linux-x64.tar.gz -L <the URL GitHub gives you>\ntar xzf ./actions-runner-linux-x64.tar.gz\n\n./config.sh --url https://github.com/<you>/<your-repo> --token <the token GitHub gives you>\n\n# Make it run permanently in the background, even after you log out\nsudo ./svc.sh install\nsudo ./svc.sh start\n```\n\n**The one step everyone forgets \u2014 and it breaks everything if you skip it:**\n\nYou need to label your runner, like putting a name tag on the employee. Go to GitHub \u2192 Settings \u2192 Runners \u2192 click your runner \u2192 add a label like `staging` or `production`. Later, your workflow will say \"I need someone with the `staging` badge\" \u2014 and if nobody has that badge, the job just waits forever, doing nothing, with no error message. This single missing label is the #1 reason beginners get stuck.\n\n| What you see | What it means | What to do |\n|---|---|---|\n| Job stuck on \"Queued\" forever | No runner has the label the job is asking for | Add the matching label to your runner |\n| \"A session already exists\" | You accidentally started the runner twice | Stop it, then start it again cleanly with `svc.sh` |\n\n## Step 4: Give the robot a secret password, safely (Secrets)\n\nYour automated pipeline needs to log into Docker Hub to store and retrieve your sealed boxes. That requires a password. But you should **never** type a real password directly into a file that other people might see (especially if your code is public on GitHub).\n\nGitHub's solution is called **Secrets** \u2014 an encrypted vault. You put the password in once, give it a name, and your workflow can use it by name without ever displaying the actual value.\n\n| Type | Name | What goes here | Why this type |\n|---|---|---|---|\n| Secret (hidden) | `DOCKERHUB_TOKEN` | A Docker Hub access token | Sensitive \u2014 should never be visible |\n| Variable (plain) | `DOCKERHUB_USER` | Your Docker Hub username | Not sensitive \u2014 just a username |\n\nYou'll also set up two **environments** \u2014 staging and production \u2014 and on production specifically, you check a box that says \"require approval before deploying here.\" This means even if all the automated checks pass, a real human still has to click \"yes, go ahead\" before anything reaches your actual live website. It's your safety net.\n\n## Step 5: Write the blueprints (config files)\n\nThree small files describe exactly how your sealed box should be built and run. Think of these as architectural blueprints \u2014 they don't *do* anything by themselves, they just describe what should happen.\n\n**The Dockerfile** \u2014 instructions for building the box:\n\n```dockerfile\nFROM nginx:alpine\nCOPY index.html /usr/share/nginx/html/index.html\nEXPOSE 80\n```\n\nThis says: \"start with a tiny pre-made web server (nginx), put my website file inside it, and let it listen on door number 80.\"\n\nOne subtle trap: don't write `EXPOSE 443` here, even though 443 is the \"secure\" door. The certificate needed for security isn't ready yet at this stage \u2014 adding it too early causes a confusing startup crash. We open that door later, in a different file.\n\n**docker-compose.yml** \u2014 instructions for *running* the box on production:\n\n```yaml\nservices:\n  web:\n    image: yourusername/yourapp:latest\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - /etc/letsencrypt:/etc/letsencrypt:ro\n      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro\n    restart: always\n```\n\nThis says: \"run my sealed box, open doors 80 and 443, and let it borrow my security certificate files.\" Both the `443` line and the certificate-borrowing line are required together \u2014 if you only do one, secure browsing silently fails.\n\nStaging gets a simpler version of this file with no certificate and no door 443 \u2014 it's just a practice server, it doesn't need to be locked down.\n\n**nginx.conf** \u2014 instructions for the receptionist (nginx) on how to greet visitors:\n\n```nginx\nserver {\n    listen 80;\n    server_name yourdomain.com;\n    return 301 https://$host$request_uri;\n}\n\nserver {\n    listen 443 ssl;\n    server_name yourdomain.com;\n    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;\n    ssl_protocols TLSv1.2 TLSv1.3;\n\n    add_header X-Frame-Options \"DENY\";\n    add_header X-Content-Type-Options \"nosniff\";\n    add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains\";\n\n    location / {\n        root /usr/share/nginx/html;\n        index index.html;\n    }\n}\n```\n\nIn plain words: \"if someone arrives through the insecure door (80), politely redirect them to the secure one (443). On the secure door, use these certificate files to encrypt everything, add a few safety headers, then show them the website.\"\n\n## Step 6: Teach the robot the actual recipe (the workflow files)\n\nThis is the heart of the whole system \u2014 a file that tells GitHub Actions exactly what to do, in what order, every time you push code.\n\nPicture an assembly line with several quality inspectors standing side by side, all checking different things *at the same time* (not one after another, which would be slow):\n\n[[DIAGRAM:pipeline]]\n\nAfter the production deploy in that picture, two more checks run automatically on the live site: a security scan and a performance scan \u2014 catching anything that only shows up once the site is actually live.\n\nThe \"master\" file that organizes all of this:\n\n```yaml\nname: DevSecOps Pipeline\non:\n  push:\n    branches: [main, staging]\n\njobs:\n  secret-scan:\n    uses: ./.github/workflows/secret-scan.yml\n    secrets: inherit\n\n  code-quality:\n    uses: ./.github/workflows/code-quality.yml\n    secrets: inherit\n\n  docker-lint:\n    uses: ./.github/workflows/docker-lint.yml\n    secrets: inherit\n\n  dependency-scan:\n    uses: ./.github/workflows/dependencies-scan.yml\n    secrets: inherit\n\n  build:\n    needs: [secret-scan, code-quality, docker-lint, dependency-scan]\n    uses: ./.github/workflows/docker-push.yml\n    secrets: inherit\n```\n\nThe important word here is `needs:`. It's the rule that says \"don't even start building until all four inspectors have given a thumbs up.\" If even one fails, the build step never runs \u2014 bad code physically cannot reach your server. This is called **fail-fast**, and it's one of the most valuable habits in this whole setup.\n\n**The deploy-to-staging file:**\n\n```yaml\nname: Deploy Staging\non:\n  workflow_run:\n    workflows: [\"DevSecOps Pipeline\"]\n    types: [completed]\n\njobs:\n  deploy:\n    runs-on: [self-hosted, Linux, X64, staging]\n    environment: staging\n    if: github.event.workflow_run.conclusion == 'success'\n    steps:\n      - uses: actions/checkout@v4\n      - uses: docker/login-action@v3\n        with:\n          username: ${{ vars.DOCKERHUB_USER }}\n          password: ${{ secrets.DOCKERHUB_TOKEN }}\n      - run: |\n          docker compose -f docker-compose.staging.yml down\n          docker compose -f docker-compose.staging.yml pull\n          docker compose -f docker-compose.staging.yml up -d\n```\n\nNotice `runs-on: [..., staging]` \u2014 that's GitHub looking for a runner with the `staging` badge we discussed earlier. This is exactly where that label matters.\n\nProduction's version is almost identical, except instead of running automatically, it waits for you to manually click a button \u2014 that's your approval gate doing its job.\n\n**One genuinely confusing rule worth knowing in advance:** GitHub always reads these workflow files from your `main` branch, even if you're actively testing changes on a different branch called `staging`. If you edit a workflow file on staging and it doesn't seem to take effect, this is almost always why \u2014 you need to merge your changes into `main` first.\n\n| What you see | What it means | What to do |\n|---|---|---|\n| \"workflow is not reusable\" | One of the smaller files is missing a line that says it's allowed to be called by another | Add `workflow_call:` to that file |\n| Staging deploy shows \"Skipped\" | The workflow file isn't on the `main` branch yet | Merge your branch into `main` |\n| Build runs even though a scan failed | The `needs:` line is missing | Add it back in |\n\n## Step 7: Lock the front door (SSL with Let's Encrypt)\n\nWithout SSL, anyone between your visitor and your server can read everything being sent \u2014 like writing a letter on a postcard instead of sealing it in an envelope. SSL is the envelope. Let's Encrypt gives these \"envelopes\" (certificates) away for free, and a tool called Certbot handles getting and installing them.\n\n**One thing must be true before you start:** your domain name needs to already be pointing at your server's address (we'll cover that next). Certbot proves you own the domain by checking this.\n\n```bash\nsudo apt-get install -y certbot\n\n# Free up door 80 temporarily so certbot can use it to prove ownership\ndocker compose down\n\nsudo certbot certonly --standalone -d yourdomain.com\n\n# Without this step, your sealed box won't be allowed to read the new certificate files\nsudo chown -R ubuntu:ubuntu /etc/letsencrypt/\nsudo chmod -R 755 /etc/letsencrypt/\n\ndocker compose up -d\n```\n\nThat permission-fixing step is small but easy to forget \u2014 and when you do forget it, the symptom is confusing: everything *looks* fine, the container starts, but door 443 quietly never opens. The container simply isn't allowed to read the certificate, so it gives up on that part silently.\n\n| What you see | What it means | What to do |\n|---|---|---|\n| Certbot times out | Either DNS isn't ready yet, or door 80 is still busy | Double check DNS, make sure `docker compose down` ran first |\n| \"too many failed authorizations\" | You tried and failed 5 times within an hour (Let's Encrypt's limit) | Just wait \u2014 the error message tells you exactly when you can try again |\n| Door 443 missing after deploying | The certificate files aren't readable | Re-run the `chown` command above |\n\n## Step 8: Make sure your address never changes (Elastic IP + DNS)\n\nHere's a frustrating default behavior: every time you restart your EC2 server, AWS gives it a **brand new IP address**. If your domain is pointing at the old one, your site silently breaks until you notice and fix it.\n\nThe fix is called an **Elastic IP** \u2014 think of it as reserving a permanent phone number for your server, instead of getting a new random number every time you restart.\n\n```\nAWS Console \u2192 EC2 \u2192 Elastic IPs \u2192 Allocate \u2192 Associate with your server\nThen go to your domain provider (Namecheap, etc.) and point your domain at this new permanent address\n```\n\nIt costs nothing as long as it's actively attached to a running server \u2014 it only starts costing money if you reserve one and then leave it unused.\n\n## Putting it all together \u2014 your actual daily routine\n\nOnce everything above is wired up, here's what using it actually looks like day to day. Notice how short this is \u2014 all that setup was so that *this* part stays simple:\n\n```bash\ngit checkout staging\n# make your changes\ngit add .\ngit commit -m \"describe what you changed\"\ngit push origin staging\n\n# wait a few minutes, watch GitHub Actions turn green\n# open the staging URL, check it looks right\n\n# happy with it? merge staging into main, then:\n# GitHub \u2192 Actions tab \u2192 Deploy Production \u2192 Run \u2192 Approve\n```\n\nThat's it. Write code, push, watch lights turn green, click approve. Everything else happens by itself.\n\n## When something breaks \u2014 how to actually debug it\n\nDon't guess randomly when something goes wrong. Work through these layers **in this exact order** \u2014 almost every problem reveals itself in the first two steps:\n\n[[DIAGRAM:debug_layers]]\n\nMost \"mysterious\" problems turn out to be one of these familiar suspects:\n\n- **The container keeps restarting in a loop** \u2192 almost always means the production blueprint (with SSL) got used on the staging server by mistake, and it's crashing trying to find certificates that don't exist there\n- **It works when you test from the server itself, but not in your browser** \u2192 your browser may have cached an old, insecure version of the page; try an incognito window\n- **Git refuses to let you push** \u2192 someone (possibly past-you) made changes you don't have locally yet; pull first, then push\n- **GitHub says your workflow file has an error** \u2192 multi-line code blocks in YAML can't contain `#` comments inside them \u2014 remove any comments from inside those blocks\n\n## Why this is worth learning properly\n\nEvery piece here \u2014 separate testing and live environments, a required human approval before anything goes live, multiple security checks running in parallel, and the ability to instantly roll back to any previous version \u2014 is exactly how real engineering teams operate, just at a larger scale. \n\nThere's nothing toy-like about this setup. A self-hosted runner, staged deployments, parallel security scanning, and a genuine approval gate is a fair description of what keeps large production systems both fast *and* safe.\n\n## Where to go after this\n\n| If you want to... | Learn this next |\n|---|---|\n| Get notified the moment a deploy happens | Add a Slack or email notification step |\n| Recover instantly from a bad deploy | Build a \"rollback to previous version\" workflow |\n| Stop manually clicking through AWS setup | Learn Terraform \u2014 it lets you describe your servers in code |\n| Run many containers across many machines | Learn Kubernetes \u2014 this whole guide was about *one* server; Kubernetes is for managing fleets of them |\n| Go even further with Kubernetes | Look into ArgoCD \u2014 deployments driven entirely by what's in your git repo |\n\nYou don't need to learn all of this at once. Get comfortable with everything above first \u2014 it's a complete, real system on its own.\n"
};

// ── Minimal markdown → HTML renderer ────────────────────────
// Supports: headers, bold, italic, links, code blocks, inline code,
// unordered/ordered lists, blockquotes, hr, paragraphs.
function renderMarkdown(md) {
  if (!md) return '<p>No content yet.</p>';

  // Extract [[DIAGRAM:name]] placeholders BEFORE escaping, so raw SVG survives
  const diagramStash = [];
  let pre = md.replace(/\[\[DIAGRAM:([a-z0-9_]+)\]\]/gi, (_, name) => {
    const svg = DIAGRAMS[name.toLowerCase()];
    const token = `@@DIAGRAM_${diagramStash.length}@@`;
    diagramStash.push(svg || '<p><em>(diagram not found)</em></p>');
    return `\n\n${token}\n\n`;
  });

  // Escape HTML first to prevent injection, then re-allow our own tags
  let html = pre
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks ```...```
  html = html.replace(/```([a-z]*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );

  // Headers
  html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

  // Blockquote
  html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

  // Horizontal rule
  html = html.replace(/^---$/gim, '<hr>');

  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Tables — | col | col | rows, with a |---|---| separator line
  {
    const lines2 = html.split('\n');
    const out2 = [];
    let i = 0;
    while (i < lines2.length) {
      const line = lines2[i];
      const isRow = /^\s*\|(.+)\|\s*$/.test(line);
      const nextIsSep = i + 1 < lines2.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines2[i+1]) && lines2[i+1].includes('-');
      if (isRow && nextIsSep) {
        const headers = line.split('|').slice(1, -1).map(s => s.trim());
        i += 2; // skip header + separator
        const rows = [];
        while (i < lines2.length && /^\s*\|(.+)\|\s*$/.test(lines2[i])) {
          rows.push(lines2[i].split('|').slice(1, -1).map(s => s.trim()));
          i++;
        }
        let table = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        for (const r of rows) {
          table += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>';
        }
        table += '</tbody></table>';
        out2.push(table);
      } else {
        out2.push(line);
        i++;
      }
    }
    html = out2.join('\n');
  }

  // Lists — group consecutive list lines
  const lines = html.split('\n');
  let out = [];
  let inUl = false, inOl = false;

  for (let line of lines) {
    const ulMatch = line.match(/^[-*] (.*)$/);
    const olMatch = line.match(/^\d+\. (.*)$/);

    if (ulMatch) {
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${ulMatch[1]}</li>`);
      continue;
    } else if (inUl) { out.push('</ul>'); inUl = false; }

    if (olMatch) {
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${olMatch[1]}</li>`);
      continue;
    } else if (inOl) { out.push('</ol>'); inOl = false; }

    out.push(line);
  }
  if (inUl) out.push('</ul>');
  if (inOl) out.push('</ol>');
  html = out.join('\n');

  // Paragraphs — wrap remaining plain lines (not already tags) into <p>
  const blockTags = /^<(h1|h2|h3|ul|ol|li|blockquote|pre|hr|table)/;
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^@@DIAGRAM_\d+@@$/.test(block)) return block;
    if (blockTags.test(block) || block.startsWith('<pre') || block.includes('<li>')) return block;
    return `<p>${block}</p>`;
  }).join('\n');

  // Restore diagram placeholders with their real SVG, wrapped for spacing
  html = html.replace(/@@DIAGRAM_(\d+)@@/g, (_, i) =>
    `<div class="art-diagram">${diagramStash[parseInt(i)]}</div>`
  );

  return html;
}

// Hero background gradients per category — distinct mood per topic
const HERO_GRADIENTS = {

  kubernetes: 'linear-gradient(135deg,#0e2f2a 0%,#0a1f1c 55%,#0a0a0a 100%)',

};

function lvlTagClass(level) {
  return {Beginner:'t-green',Intermediate:'t-yellow',Advanced:'t-red'}[level] || 't-green';
}

function renderArticle(a) {
  document.title = `${a.title} — DevOps Hub`;
  const tagClass = TAG_CLASS[a.category_slug] || 't-blue';
  const heroGrad = HERO_GRADIENTS[a.category_slug] || HERO_GRADIENTS['cicd'];

  // Populate hero
  document.getElementById('heroBg').style.background = heroGrad;
  document.getElementById('heroKicker').textContent = (a.category || 'General').toUpperCase();
  document.getElementById('heroTitle').textContent = a.title;
  document.getElementById('heroSection').style.display = 'flex';

  document.getElementById('content').innerHTML = `
    <div class="art-meta-row">
      <span class="tag ${tagClass}">${a.category || 'General'}</span>
      <span class="tag ${lvlTagClass(a.level)}">${a.level}</span>
      <span class="rtime">${a.read_time} min read</span>
    </div>
    ${a.excerpt ? `<p class="art-excerpt">${a.excerpt}</p>` : ''}
    <div class="art-body">${renderMarkdown(a.content)}</div>
    <div class="art-footer">
      <button class="back-btn" onclick="location.href='index.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
        Back to all articles
      </button>
      <div class="more-section" id="moreSection"></div>
    </div>
  `;
  loadMoreArticles(a.category_slug, a.slug);
}

async function loadMoreArticles(categorySlug, currentSlug) { return; 
  const container = document.getElementById('moreSection');
  if (!container) return;
  try {
    const res = await fetch(`${API}/articles?category=${categorySlug}&per_page=4`, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const others = data.articles.filter(x => x.slug !== currentSlug).slice(0, 3);
    if (!others.length) return;

    container.innerHTML = `
      <div class="more-label">More in this topic</div>
      <div class="more-grid">
        ${others.map(o => {
          const icon = CARD_ICONS[o.category_slug] || CARD_ICONS['docker'];
          return `<div class="more-card" onclick="location.href='article.html?slug=${o.slug}'">
            <div class="more-card-icon">
              <svg viewBox="0 0 18 18" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>
            </div>
            <div>
              <h4>${o.title}</h4>
              <p>${o.level} · ${o.read_time} min read</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  } catch {
    // Silently skip — not critical to the page
  }
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="state-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
      <p style="font-size:16px;color:var(--text2);margin-bottom:18px">${msg}</p>
      <button class="back-btn" onclick="location.href='index.html'">← Back to all articles</button>
    </div>
  `;
}

  renderArticle(MOCK_ARTICLE);
}
