<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading article... — DevOps Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
  --border:#2a2a2a;--border2:#383838;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --accent:#4a9eff;--accent-bg:rgba(74,158,255,.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,.15);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.15);
  --red:#ef4444;--red-bg:rgba(239,68,68,.15);
  --orange:#f97316;--teal:#14b8a6;
  --r:10px;--rs:6px;--max:700px;
  --serif:'Iowan Old Style','Palatino Linotype',Georgia,'Times New Roman',serif
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:17px;line-height:1.75;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center}
.nav-inner{max-width:1120px;width:100%;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:28px}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;flex-shrink:0}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.back-link{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);padding:6px 12px;border-radius:var(--rs);transition:all .15s;cursor:pointer}
.back-link:hover{color:var(--text);background:var(--bg3)}
.back-link svg{width:14px;height:14px}

/* HERO */
.hero{position:relative;height:340px;overflow:hidden;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,0) 0%,rgba(10,10,10,.55) 55%,rgba(10,10,10,.96) 100%);z-index:1}
.hero-content{position:relative;z-index:2;max-width:var(--max);margin:0 auto;padding:0 24px 36px;width:100%}
.hero-kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.hero-title{font-family:var(--serif);font-size:clamp(30px,5vw,46px);font-weight:600;line-height:1.18;letter-spacing:-.01em;color:#fff;text-shadow:0 2px 24px rgba(0,0,0,.4)}

/* CONTAINER */
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px 100px}

/* LOADING/ERROR */
.state-box{text-align:center;padding:100px 24px;color:var(--text3)}
.state-box svg{width:32px;height:32px;margin:0 auto 16px;opacity:.4}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{to{background-position:-200% 0}}

/* ARTICLE META ROW (under hero) */
.art-meta-row{display:flex;align-items:center;gap:14px;padding:24px 0 22px;border-bottom:1px solid var(--border);margin-bottom:36px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:5px;font-size:12px;font-weight:600;letter-spacing:.02em}
.t-blue{background:var(--accent-bg);color:var(--accent)}
.t-green{background:var(--green-bg);color:var(--green)}
.t-yellow{background:var(--yellow-bg);color:var(--yellow)}
.t-red{background:var(--red-bg);color:var(--red)}
.rtime{font-size:13px;color:var(--text3);margin-left:auto}
.art-excerpt{font-family:var(--serif);font-size:21px;line-height:1.55;color:#cfcfcf;font-weight:400;margin-bottom:8px;letter-spacing:.01em}

/* ARTICLE BODY (rendered markdown) */
.art-body{font-size:17.5px}
.art-body h1{font-family:var(--serif);font-size:30px;font-weight:600;color:#fff;margin:48px 0 18px;letter-spacing:-.01em;line-height:1.25}
.art-body h2{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:52px 0 18px;padding-top:4px}
.art-body h3{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;margin:34px 0 14px;line-height:1.3}
.art-body p{margin-bottom:20px;color:#d4d4d4}
.art-body ul,.art-body ol{margin:0 0 20px 22px;color:#d4d4d4}
.art-body li{margin-bottom:10px}
.art-body code{background:var(--bg3);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:14px;font-family:'SF Mono',Monaco,monospace;color:#e8b34a}
.art-body pre{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:24px;overflow-x:auto}
.art-body pre code{background:none;border:none;padding:0;color:#9cdcfe;font-size:13.5px;line-height:1.6}
.art-body blockquote{font-family:var(--serif);font-size:22px;line-height:1.5;border-left:3px solid var(--accent);padding:6px 0 6px 22px;color:#eee;margin:32px 0;font-style:italic}
.art-body a{color:var(--accent);text-decoration:underline;text-decoration-color:var(--accent-bg)}
.art-body strong{color:#fff;font-weight:600}
.art-body hr{border:none;border-top:1px solid var(--border);margin:40px 0}
.art-body img{max-width:100%;border-radius:var(--r);margin:24px 0}
.art-body table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:15px}
.art-diagram{margin:32px 0;padding:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.art-diagram svg{width:100%;height:auto;display:block}
.art-diagram text{fill:#d4d4d4;font-family:inherit}
.art-diagram .th{font-weight:600;fill:#fff;font-size:13px}
.art-diagram .ts{font-size:11.5px;fill:#999}
.art-body th,.art-body td{padding:11px 14px;border:1px solid var(--border);text-align:left}
.art-body th{background:var(--bg3);color:var(--text2);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.03em}

/* First paragraph after excerpt gets a touch more presence */
.art-body > p:first-of-type{font-size:18.5px;color:#e8e8e8}

/* FOOTER NAV */
.art-footer{margin-top:56px;padding-top:36px;border-top:1px solid var(--border)}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;transition:all .15s;margin-bottom:40px}
.back-btn:hover{background:var(--bg4)}
.back-btn svg{width:14px;height:14px}

/* MORE ARTICLES CARD */
.more-section{margin-top:8px}
.more-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.more-grid{display:grid;gap:12px}
.more-card{display:flex;gap:14px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s}
.more-card:hover{border-color:var(--border2)}
.more-card-icon{width:40px;height:40px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.more-card-icon svg{width:20px;height:20px}
.more-card h4{font-size:14.5px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.4}
.more-card p{font-size:13px;color:var(--text3)}

@media (max-width:600px){
  .hero{height:260px}
  .art-meta-row{flex-wrap:wrap}
  .rtime{margin-left:0;width:100%}
}
</style>
</head>

// ── Minimal markdown → HTML renderer ────────────────────────
// Supports: headers, bold, italic, links, code blocks, inline code,
// unordered/ordered lists, blockquotes, hr, paragraphs.
function renderMarkdown(md) {
  if (!md) return '<p>No content yet.</p>';

  // Extract [[DIAGRAM:name]] placeholders BEFORE escaping, so raw SVG survives
  const diagramStash = [];
  let pre = md.replace(/\[\[DIAGRAM:([a-z0-9_]+)\]\]/gi, (_, name) => {
    const svg = DIAGRAMS[name.toLowerCase()];
    const token = `@@DIAGRAM_${diagramStash.length}@@`;
    diagramStash.push(svg || '<p><em>(diagram not found)</em></p>');
    return `\n\n${token}\n\n`;
  });

  // Escape HTML first to prevent injection, then re-allow our own tags
  let html = pre
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks ```...```
  html = html.replace(/```([a-z]*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );

  // Headers
  html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

  // Blockquote
  html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

  // Horizontal rule
  html = html.replace(/^---$/gim, '<hr>');

  // Bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Tables — | col | col | rows, with a |---|---| separator line
  {
    const lines2 = html.split('\n');
    const out2 = [];
    let i = 0;
    while (i < lines2.length) {
      const line = lines2[i];
      const isRow = /^\s*\|(.+)\|\s*$/.test(line);
      const nextIsSep = i + 1 < lines2.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines2[i+1]) && lines2[i+1].includes('-');
      if (isRow && nextIsSep) {
        const headers = line.split('|').slice(1, -1).map(s => s.trim());
        i += 2; // skip header + separator
        const rows = [];
        while (i < lines2.length && /^\s*\|(.+)\|\s*$/.test(lines2[i])) {
          rows.push(lines2[i].split('|').slice(1, -1).map(s => s.trim()));
          i++;
        }
        let table = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
        for (const r of rows) {
          table += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>';
        }
        table += '</tbody></table>';
        out2.push(table);
      } else {
        out2.push(line);
        i++;
      }
    }
    html = out2.join('\n');
  }

  // Lists — group consecutive list lines
  const lines = html.split('\n');
  let out = [];
  let inUl = false, inOl = false;

  for (let line of lines) {
    const ulMatch = line.match(/^[-*] (.*)$/);
    const olMatch = line.match(/^\d+\. (.*)$/);

    if (ulMatch) {
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${ulMatch[1]}</li>`);
      continue;
    } else if (inUl) { out.push('</ul>'); inUl = false; }

    if (olMatch) {
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${olMatch[1]}</li>`);
      continue;
    } else if (inOl) { out.push('</ol>'); inOl = false; }

    out.push(line);
  }
  if (inUl) out.push('</ul>');
  if (inOl) out.push('</ol>');
  html = out.join('\n');

  // Paragraphs — wrap remaining plain lines (not already tags) into <p>
  const blockTags = /^<(h1|h2|h3|ul|ol|li|blockquote|pre|hr|table)/;
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^@@DIAGRAM_\d+@@$/.test(block)) return block;
    if (blockTags.test(block) || block.startsWith('<pre') || block.includes('<li>')) return block;
    return `<p>${block}</p>`;
  }).join('\n');

  // Restore diagram placeholders with their real SVG, wrapped for spacing
  html = html.replace(/@@DIAGRAM_(\d+)@@/g, (_, i) =>
    `<div class="art-diagram">${diagramStash[parseInt(i)]}</div>`
  );

  return html;
}

// Hero background gradients per category — distinct mood per topic
const HERO_GRADIENTS = {
  cicd:       'linear-gradient(135deg,#16243f 0%,#0a1424 55%,#0a0a0a 100%)',
  kubernetes: 'linear-gradient(135deg,#0e2f2a 0%,#0a1f1c 55%,#0a0a0a 100%)',
  docker:     'linear-gradient(135deg,#16243f 0%,#0a1424 55%,#0a0a0a 100%)',

  security:   'linear-gradient(135deg,#3a1818 0%,#220e0e 55%,#0a0a0a 100%)',
  monitoring: 'linear-gradient(135deg,#163018 0%,#0e1f10 55%,#0a0a0a 100%)',
  linux:      'linear-gradient(135deg,#22242a 0%,#15161a 55%,#0a0a0a 100%)',
  iac:        'linear-gradient(135deg,#3a2410 0%,#23150a 55%,#0a0a0a 100%)',
};

function lvlTagClass(level) {
  return {Beginner:'t-green',Intermediate:'t-yellow',Advanced:'t-red'}[level] || 't-green';
}

function renderArticle(a) {
  document.title = `${a.title} — DevOps Hub`;
  const tagClass = TAG_CLASS[a.category_slug] || 't-blue';
  const heroGrad = HERO_GRADIENTS[a.category_slug] || HERO_GRADIENTS['cicd'];

  // Populate hero
  document.getElementById('heroBg').style.background = heroGrad;
  document.getElementById('heroKicker').textContent = (a.category || 'General').toUpperCase();
  document.getElementById('heroTitle').textContent = a.title;
  document.getElementById('heroSection').style.display = 'flex';

  document.getElementById('content').innerHTML = `
    <div class="art-meta-row">
      <span class="tag ${tagClass}">${a.category || 'General'}</span>
      <span class="tag ${lvlTagClass(a.level)}">${a.level}</span>
      <span class="rtime">${a.read_time} min read</span>
    </div>
    ${a.excerpt ? `<p class="art-excerpt">${a.excerpt}</p>` : ''}
    <div class="art-body">${renderMarkdown(a.content)}</div>
    <div class="art-footer">
      <button class="back-btn" onclick="location.href='index.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
        Back to all articles
      </button>
      <div class="more-section" id="moreSection"></div>
    </div>
  `;
  loadMoreArticles(a.category_slug, a.slug);
}

};

async function loadMoreArticles(categorySlug, currentSlug) {
  const container = document.getElementById('moreSection');
  if (!container) return;
  try {
    const res = await fetch(`${API}/articles?category=${categorySlug}&per_page=4`, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const others = data.articles.filter(x => x.slug !== currentSlug).slice(0, 3);
    if (!others.length) return;

    container.innerHTML = `
      <div class="more-label">More in this topic</div>
      <div class="more-grid">
        ${others.map(o => {
          const icon = CARD_ICONS[o.category_slug] || CARD_ICONS['docker'];
          return `<div class="more-card" onclick="location.href='article.html?slug=${o.slug}'">
            <div class="more-card-icon">
              <svg viewBox="0 0 18 18" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>
            </div>
            <div>
              <h4>${o.title}</h4>
              <p>${o.level} · ${o.read_time} min read</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  } catch {
    // Silently skip — not critical to the page
  }
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="state-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
      <p style="font-size:16px;color:var(--text2);margin-bottom:18px">${msg}</p>
      <button class="back-btn" onclick="location.href='index.html'">← Back to all articles</button>
    </div>
  `;
}

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    renderError("No article specified.");
    return;
  }

  try {
    const res = await fetch(`${API}/articles/${slug}`, { signal: AbortSignal.timeout(5000) });
    if (!res.ok) throw new Error('not found');
    const article = await res.json();
    renderArticle(article);
  } catch {
    renderError("This article couldn't be loaded. It may have been removed.");
  }
}

loadArticle();
